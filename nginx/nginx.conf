events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream docs {
        server docs:3000;
    }

    # ── HTTP (port 80) ────────────────────────────────────────────────────────
    # Sert toujours l'IP nue (pas de certificat possible dessus) ; redirige
    # vers HTTPS uniquement pour le nom de domaine (requis par Google/Microsoft
    # OAuth, qui refusent les redirect URI en HTTP hors localhost).
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        client_max_body_size 50M;

        # Healthcheck Docker — répond sans dépendre du backend ni du frontend
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # Challenge ACME Let's Encrypt (certbot webroot + renouvellement)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            if ($host = logplus.duckdns.org) {
                return 301 https://$host$request_uri;
            }

            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Site de documentation (app Next.js indépendante, basePath=/docs)
        location /docs {
            proxy_pass http://docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ingestion agents — location dédiée pour des timeouts adaptés aux
        # batchs NDJSON volumineux, indépendamment du reste de l'API.
        location /api/ingest/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /staticfiles/;
        }

        # Binaires + scripts d'installation de l'agent Log+ natif (téléchargés
        # depuis la page Agents du dashboard) — mêmes fichiers servis en HTTP
        # et HTTPS, le script d'installation vérifie leur intégrité (SHA-256)
        # avant exécution quel que soit le protocole utilisé pour le download.
        location /agents/ {
            alias /agent_dist/;
            # Type MIME texte explicite pour les scripts : sans ça, .ps1/.sh
            # tombent sur default_type application/octet-stream, et
            # Invoke-WebRequest sous Windows PowerShell 5.1 peut alors
            # renvoyer .Content en byte[] plutôt qu'en string, corrompant
            # tout traitement texte côté client. Les binaires (sans
            # extension) restent en octet-stream (comportement par défaut).
            types {
                text/plain sh ps1 sha256;
            }
            charset utf-8;
        }
    }

    # ── HTTPS (port 443) — logplus.duckdns.org ─────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name logplus.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/logplus.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/logplus.duckdns.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # WebSockets — Django Channels
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # API Django REST Framework
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ingestion agents — location dédiée pour des timeouts adaptés aux
        # batchs NDJSON volumineux, indépendamment du reste de l'API.
        location /api/ingest/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Interface d'administration Django
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Fichiers statiques Django (servis directement par nginx, pas par Daphne)
        location /static/ {
            alias /staticfiles/;
        }

        # Binaires + scripts d'installation de l'agent Log+ natif.
        location /agents/ {
            alias /agent_dist/;
            # Type MIME texte explicite pour les scripts : sans ça, .ps1/.sh
            # tombent sur default_type application/octet-stream, et
            # Invoke-WebRequest sous Windows PowerShell 5.1 peut alors
            # renvoyer .Content en byte[] plutôt qu'en string, corrompant
            # tout traitement texte côté client. Les binaires (sans
            # extension) restent en octet-stream (comportement par défaut).
            types {
                text/plain sh ps1 sha256;
            }
            charset utf-8;
        }

        # Site de documentation (app Next.js indépendante, basePath=/docs) —
        # pas de sous-domaine dédié : DuckDNS ne permet pas d'ajouter un
        # sous-domaine par API, uniquement via le compte web.
        location /docs {
            proxy_pass http://docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend Next.js (tout le reste)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
