events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;

    # Format "combined" standard (méthode, chemin, code retour, referer,
    # user-agent) envoyé au récepteur syslog interne d'Argus — permet au
    # tableau de bord Trafic & IP d'afficher la requête HTTP exacte et le
    # referer de chaque visiteur, pas seulement un compteur. Le facility
    # local6 est dédié à ce flux pour que le normaliseur syslog le distingue
    # sans ambiguïté des logs d'authentification SSH (facility auth/authpriv).
    log_format argus_access '$remote_addr - [$time_local] "$request" $status '
                             '$body_bytes_sent "$http_referer" "$http_user_agent"';

    # IP admin/perso générant en permanence du bruit de polling (le SPA se
    # rafraîchit en arrière-plan tant qu'un onglet est ouvert) — exclue de
    # l'ingestion à la source plutôt que filtrée endpoint par endpoint, qui
    # ne suit jamais tous les nouveaux polling ajoutés au fil des pages.
    # Ajouter/retirer des IP ici selon le déploiement (IP publique de
    # l'équipe SOC elle-même, pas celle d'un visiteur/attaquant réel).
    map $remote_addr $argus_loggable {
        default 1;
        74.118.126.32 0;
    }
    access_log syslog:server=syslog_receiver:5140,facility=local6,tag=nginx_access,severity=info argus_access if=$argus_loggable;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream docs {
        server docs:3000;
    }

    # ── HTTP (port 80) ────────────────────────────────────────────────────────
    # Sert toujours l'IP nue (pas de certificat possible dessus) ; redirige
    # vers HTTPS uniquement pour le nom de domaine (requis par Google/Microsoft
    # OAuth, qui refusent les redirect URI en HTTP hors localhost).
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        client_max_body_size 50M;

        # Healthcheck Docker — répond sans dépendre du backend ni du frontend
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # Challenge ACME Let's Encrypt (certbot webroot + renouvellement)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            if ($host = argussiem.com) {
                return 301 https://$host$request_uri;
            }
            if ($host = www.argussiem.com) {
                return 301 https://$host$request_uri;
            }

            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Site de documentation (app Next.js indépendante, basePath=/docs)
        location /docs {
            proxy_pass http://docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Endpoints interrogés automatiquement en arrière-plan par le frontend
        # (React Query refetchInterval — 15 à 120s selon la page) : ce n'est
        # pas du trafic "visite", juste le SPA qui se tient à jour tant qu'un
        # onglet reste ouvert. Exclu de l'ingestion Trafic & IP pour ne pas
        # noyer les vraies requêtes (navigation, actions, tentatives externes)
        # sous des centaines d'entrées identiques par utilisateur connecté.
        # Regex évaluée AVANT le préfixe /api/ générique (priorité nginx).
        location ~ ^/api/(auth/notifications|dashboard/summary|alerts/stats|ml/predictions|collectors/(connectors|jobs|enrollment-tokens)|soar/(blocked-ips|playbooks|stats|executions)|threat-intel/(stats|indicators|enriched-logs|cves(/stats)?)|logs/ip-traffic)/?$ {
            access_log off;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ingestion agents — location dédiée pour des timeouts adaptés aux
        # batchs NDJSON volumineux, indépendamment du reste de l'API.
        location /api/ingest/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /staticfiles/;
        }

        # Binaires + scripts d'installation de l'agent Argus natif (téléchargés
        # depuis la page Agents du dashboard) — mêmes fichiers servis en HTTP
        # et HTTPS, le script d'installation vérifie leur intégrité (SHA-256)
        # avant exécution quel que soit le protocole utilisé pour le download.
        location /agents/ {
            alias /agent_dist/;
            # Type MIME texte explicite pour les scripts : sans ça, .ps1/.sh
            # tombent sur default_type application/octet-stream, et
            # Invoke-WebRequest sous Windows PowerShell 5.1 peut alors
            # renvoyer .Content en byte[] plutôt qu'en string, corrompant
            # tout traitement texte côté client. Les binaires (sans
            # extension) restent en octet-stream (comportement par défaut).
            types {
                text/plain sh ps1 sha256;
            }
            charset utf-8;
        }
    }

    # ── HTTPS (port 443) — argussiem.com ─────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name argussiem.com www.argussiem.com;

        ssl_certificate     /etc/letsencrypt/live/argussiem.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/argussiem.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # WebSockets — Django Channels
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # API Django REST Framework
        # Endpoints interrogés automatiquement en arrière-plan par le frontend
        # (React Query refetchInterval — 15 à 120s selon la page) : ce n'est
        # pas du trafic "visite", juste le SPA qui se tient à jour tant qu'un
        # onglet reste ouvert. Exclu de l'ingestion Trafic & IP pour ne pas
        # noyer les vraies requêtes (navigation, actions, tentatives externes)
        # sous des centaines d'entrées identiques par utilisateur connecté.
        # Regex évaluée AVANT le préfixe /api/ générique (priorité nginx).
        location ~ ^/api/(auth/notifications|dashboard/summary|alerts/stats|ml/predictions|collectors/(connectors|jobs|enrollment-tokens)|soar/(blocked-ips|playbooks|stats|executions)|threat-intel/(stats|indicators|enriched-logs|cves(/stats)?)|logs/ip-traffic)/?$ {
            access_log off;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ingestion agents — location dédiée pour des timeouts adaptés aux
        # batchs NDJSON volumineux, indépendamment du reste de l'API.
        location /api/ingest/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Interface d'administration Django
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Fichiers statiques Django (servis directement par nginx, pas par Daphne)
        location /static/ {
            alias /staticfiles/;
        }

        # Binaires + scripts d'installation de l'agent Argus natif.
        location /agents/ {
            alias /agent_dist/;
            # Type MIME texte explicite pour les scripts : sans ça, .ps1/.sh
            # tombent sur default_type application/octet-stream, et
            # Invoke-WebRequest sous Windows PowerShell 5.1 peut alors
            # renvoyer .Content en byte[] plutôt qu'en string, corrompant
            # tout traitement texte côté client. Les binaires (sans
            # extension) restent en octet-stream (comportement par défaut).
            types {
                text/plain sh ps1 sha256;
            }
            charset utf-8;
        }

        # Site de documentation (app Next.js indépendante, basePath=/docs) —
        # pas de sous-domaine dédié : DuckDNS ne permet pas d'ajouter un
        # sous-domaine par API, uniquement via le compte web.
        location /docs {
            proxy_pass http://docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend Next.js (tout le reste)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
