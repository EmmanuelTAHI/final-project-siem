[pytest]
; Suite dédiée : tests HTTP réels contre la prod (aucune DB Django locale).
; Ne PAS hériter de DJANGO_SETTINGS_MODULE=config.settings.development défini
; dans le pytest.ini principal (backend/pytest.ini) — ce dossier a son propre
; fichier pour que pytest ne remonte pas la config parente quand on l'exécute
; en ciblant ce dossier directement.
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: tests potentiellement longs ou coûteux à exécuter (ex: ML train, génération de rapports)
