# Forward des résultats de scan de sécurité (rkhunter, ClamAV) vers le
# récepteur SIEM Argus, via la même route que le forward auth/kernel
# existant (99-forward-siem.conf) -- même connecteur "Syslog VPS
# (auth/kernel)" côté SIEM, la résolution se fait par IP source, pas par
# facility, donc aucun nouveau connecteur n'est nécessaire.
#
# Installer : cp dans /etc/rsyslog.d/98-forward-security-scans.conf,
# `systemctl restart rsyslog`.
module(load="imfile")

input(type="imfile"
      File="/var/log/rkhunter-argus.log"
      Tag="rkhunter-scan:"
      Facility="local5"
      Severity="warning")

input(type="imfile"
      File="/var/log/clamav-argus.log"
      Tag="clamav-scan:"
      Facility="local5"
      Severity="warning")

local5.* @127.0.0.1:514
