# ============================================================
# Surcouche de developpement — fusionnee automatiquement par
# "docker compose up" (aucune option a ajouter).
#
# Elle active le hot-reload :
#   - frontend : "npm run dev" avec le code source monte en volume
#   - backend  : "manage.py runserver" (autoreload Django) au lieu de daphne
#
# Pour lancer la stack SANS cette surcouche (mode "production"),
# utiliser :
#   docker compose -f docker-compose.yml up -d --build
# ============================================================

services:
  backend:
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "True"

  frontend:
    build:
      target: deps
    command: sh -c "npm run dev"
    environment:
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
